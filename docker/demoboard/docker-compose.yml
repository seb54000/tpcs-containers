version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-service:
    build: ./api-service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasks
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_QUEUE: jobs
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker-service:
    build: ./worker-service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasks
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_QUEUE: jobs
    depends_on:
      - db
      - redis

  frontend-service:
    build: ./frontend-service
    depends_on:
      - api-service
    ports:
      - "8080:80"

volumes:
  pgdata:
